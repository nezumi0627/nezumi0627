<svg fill="none" viewBox="0 0 1500 800" width="1500" height="800" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .container {
                    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    margin: 0;
                    width: 100%;
                    height: 800px;
                    background: linear-gradient(125deg, #0f172a 0%, #1e293b 100%);
                    position: relative;
                    overflow: hidden;
                }

                .aurora {
                    position: absolute;
                    width: 150%;
                    height: 150%;
                    background: 
                        radial-gradient(circle at 50% -20%, rgba(147, 51, 234, 0.15) 0%, transparent 70%),
                        radial-gradient(circle at 0% 120%, rgba(59, 130, 246, 0.15) 0%, transparent 70%),
                        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
                    filter: blur(60px);
                    animation: aurora 15s ease infinite;
                }

                .cyber-grid {
                    position: absolute;
                    width: 200%;
                    height: 200%;
                    background: 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
                    background-size: 60px 60px;
                    transform: perspective(1000px) rotateX(60deg) translateY(-300px) scale(1.5);
                    opacity: 0.3;
                }

                .content {
                    position: relative;
                    z-index: 1;
                    text-align: center;
                    padding: 4rem;
                    background: rgba(15, 23, 42, 0.6);
                    border-radius: 40px;
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    box-shadow: 
                        0 0 80px rgba(0, 0, 0, 0.3),
                        inset 0 0 40px rgba(0, 0, 0, 0.2);
                    backdrop-filter: blur(20px);
                }

                .title {
                    font-size: 140px;
                    font-weight: 800;
                    margin: 0;
                    background: linear-gradient(120deg, 
                        #10b981 0%, 
                        #3b82f6 25%, 
                        #9333ea 50%,
                        #3b82f6 75%,
                        #10b981 100%);
                    background-size: 400% auto;
                    -webkit-background-clip: text;
                    background-clip: text;
                    color: transparent;
                    text-shadow: 
                        0 0 40px rgba(16, 185, 129, 0.3),
                        0 0 80px rgba(59, 130, 246, 0.2),
                        0 0 120px rgba(147, 51, 234, 0.1);
                    animation: shine 15s linear infinite, glow 3s ease-in-out infinite alternate;
                }

                .subtitle {
                    font-size: 60px;
                    margin: 40px 0 0 0;
                    letter-spacing: 4px;
                    font-weight: 300;
                }

                .subtitle-gradient {
                    background: linear-gradient(120deg, #e2e8f0, #f8fafc);
                    -webkit-background-clip: text;
                    background-clip: text;
                    color: transparent;
                }

                .emoji {
                    color: #f8fafc;
                }

                .info-text {
                    font-size: 32px;
                    color: #94a3b8;
                    margin: 30px 0;
                    letter-spacing: 2px;
                    line-height: 1.6;
                    font-weight: 300;
                }

                .highlight {
                    color: #10b981;
                    font-weight: 500;
                    text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
                }

                .particles {
                    position: absolute;
                    width: 100%;
                    height: 100%;
                    background-image: 
                        radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, transparent 1px),
                        radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 1px);
                    background-size: 40px 40px, 30px 30px;
                    background-position: 0 0, 20px 20px;
                    animation: float 20s linear infinite;
                }

                @keyframes aurora {
                    0%, 100% { transform: rotate(0deg) scale(1); }
                    50% { transform: rotate(180deg) scale(1.5); }
                }

                @keyframes shine {
                    0% { background-position: 0% center; }
                    100% { background-position: 400% center; }
                }

                @keyframes glow {
                    0% {
                        text-shadow: 
                            0 0 40px rgba(16, 185, 129, 0.3),
                            0 0 80px rgba(59, 130, 246, 0.2),
                            0 0 120px rgba(147, 51, 234, 0.1);
                    }
                    100% {
                        text-shadow: 
                            0 0 60px rgba(16, 185, 129, 0.4),
                            0 0 100px rgba(59, 130, 246, 0.3),
                            0 0 140px rgba(147, 51, 234, 0.2);
                    }
                }

                @keyframes float {
                    0%, 100% { transform: translateY(0) rotate(0deg); }
                    50% { transform: translateY(20px) rotate(180deg); }
                }
            </style>
            <div class="container">
                <div class="aurora"></div>
                <div class="cyber-grid"></div>
                <div class="particles"></div>
                <div class="content">
                    <h1 class="title">Hi! I'm nezumi🐭</h1>
                    <p class="subtitle">
                        <span class="subtitle-gradient">A Python Developer from Japan</span>
                        <span class="emoji">🐍</span>
                    </p>
                    <p class="info-text">
                        <span class="highlight">16-year-old</span> developer based in <span class="highlight">Fukuoka, Japan</span>
                    </p>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
